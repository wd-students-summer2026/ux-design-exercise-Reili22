<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Experience Design</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px 40px;
            background-color: #8ccbd9;
            color: #333;
        }

        h1 {
            font-size: 36px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        h2 {
            font-size: 24px;
            margin-top: 40px;
        }

        section {
            margin-bottom: 60px;
        }

        section.prototype a {
            display: inline-block;
            padding: 12px 24px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            margin-top: 10px;
        }

        section.prototype a:hover {
            background-color: #555;
        }

        section.wireframes .wireframes-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }

        section.wireframes .wireframes-grid img {
            width: 280px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }

        section.wireframes .wireframes-grid figure {
            margin: 0;
            text-align: center;
        }

        section.wireframes .wireframes-grid figcaption {
            margin-top: 8px;
            font-size: 14px;
            color: #666;
        }

        section.site_map img {
            max-width: 800px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>User Experience Design</h1>

    <section class="prototype">
        <h2>Clickable Prototype</h2>
        <p>Click the link below to view the interactive prototype for Paw & Hope, a stray animal rescue and adoption website.</p>
        <a href="https://www.figma.com/proto/BE4XeBfMyFdgH1JExrzane/Untitled?node-id=4-89&p=f&t=zPwSf8QIU68DkQEj-1&scaling=scale-down&content-scaling=fixed&page-id=0%3A1&starting-point-node-id=1%3A844" target="_blank">View Clickable Prototype</a>
    </section>

    <section class="wireframes">
        <h2>Wireframes</h2>
        <div class="wireframes-grid">
            <figure>
                <img src="ux/Home.png" alt="Home page wireframe">
                <figcaption>Home</figcaption>
            </figure>
            <figure>
                <img src="ux/Adopt.png" alt="Adopt page wireframe">
                <figcaption>Adopt</figcaption>
            </figure>
            <figure>
                <img src="ux/Adopt Cat Filter.png" alt="Adopt Cat Filter wireframe">
                <figcaption>Adopt – Cat Filter</figcaption>
            </figure>
            <figure>
                <img src="ux/Rescue.png" alt="Rescue page wireframe">
                <figcaption>Rescue</figcaption>
            </figure>
            <figure>
                <img src="ux/Donate.png" alt="Donate page wireframe">
                <figcaption>Donate</figcaption>
            </figure>
            <figure>
                <img src="ux/Contact.png" alt="Contact page wireframe">
                <figcaption>Contact</figcaption>
            </figure>
            <figure>
                <img src="ux/Adopt_apply_information.png" alt="Adopt Apply Information wireframe">
                <figcaption>Adopt – Apply Information</figcaption>
            </figure>
            <figure>
                <img src="ux/Adopt_Age.png" alt="Adopt Age wireframe">
                <figcaption>Adopt – Age Filter</figcaption>
            </figure>
            <figure>
                <img src="ux/Adopt_search_for_more_information.png" alt="Adopt Search for More Information wireframe">
                <figcaption>Adopt – Search for More Information</figcaption>
            </figure>
            <figure>
                <img src="ux/Donate_thankyou.png" alt="Donate Thank You wireframe">
                <figcaption>Donate – Thank You</figcaption>
            </figure>
        </div>
    </section>

    <section class="site_map">
        <h2>Site Map</h2>
        <img src="ux/sitemap.png" alt="Site map of Paw and Hope website">
    </section>

</body>
</html>
